<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Stress Prediction</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(to right, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 900px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        padding: 30px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .header h2 {
        color: #333;
    }

    .header a {
        text-decoration: none;
        background: #ff4b5c;
        color: white;
        padding: 8px 15px;
        border-radius: 6px;
    }

    .header a:hover {
        background: #e63946;
    }

    form {
        text-align: center;
    }

    input {
        width: 45%;
        padding: 10px;
        margin: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #667eea;
    }

    button {
        width: 50%;
        padding: 12px;
        background: #667eea;
        border: none;
        color: white;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #5a67d8;
    }

    .links {
        margin-top: 20px;
        text-align: center;
    }

    .links a {
        text-decoration: none;
        color: #667eea;
        margin: 0 10px;
    }

    .links a:hover {
        text-decoration: underline;
    }
</style>
```

</head>

<body>

<div class="container">

```
<div class="header">
    <h2>Stress Prediction Dashboard</h2>
    <a href="/logout">Logout</a>
</div>

<form action="/predict" method="post">

    <input type="number" step="any" name="sleep" placeholder="Sleep Hours" required>
    <input type="number" step="any" name="study" placeholder="Study Hours" required><br>

    <input type="number" step="any" name="mobile" placeholder="Mobile Usage" required>
    <input type="number" step="any" name="exercise" placeholder="Exercise Hours" required><br>

    <input type="number" step="any" name="relax" placeholder="Relaxation Hours" required><br>

    <button type="submit">Predict Stress Level</button>

</form>

<div class="links">
    <a href="/history">View History</a>
</div>
```

</div>

</body>
</html>

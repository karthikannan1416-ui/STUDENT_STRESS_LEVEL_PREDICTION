<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Stress Prediction</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(to right, #36d1dc, #5b86e5);
        min-height: 100vh;
        padding: 40px;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        background: #fff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    table thead {
        background: #5b86e5;
        color: white;
    }

    table th, table td {
        padding: 12px;
        text-align: center;
    }

    table tr:nth-child(even) {
        background: #f2f2f2;
    }

    table tr:hover {
        background: #e6f0ff;
    }

    th {
        font-weight: bold;
    }

    .back {
        display: block;
        margin-top: 20px;
        text-align: center;
    }

    .back a {
        text-decoration: none;
        color: #5b86e5;
        font-weight: bold;
    }

    .back a:hover {
        text-decoration: underline;
    }
</style>
```

</head>

<body>

<div class="container">

```
<h2>Your Stress Prediction History</h2>

<table>
    <thead>
        <tr>
            <th>Sleep</th>
            <th>Study</th>
            <th>Mobile</th>
            <th>Exercise</th>
            <th>Relax</th>
            <th>Result</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
    </thead>

    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>
            <td>{{ row[7] }}</td>
            <td>{{ row[8] }}</td>
            <td>{{ row[9] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div class="back">
    <a href="/dashboard">⬅ Back to Dashboard</a>
</div>
```

</div>

</body>
</html>

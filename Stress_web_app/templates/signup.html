<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Stress Prediction</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(to right, #43e97b, #38f9d7);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        display: flex;
        width: 700px;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .left {
        width: 50%;
        background: linear-gradient(to bottom, #43e97b, #00c853);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 30px;
        text-align: center;
    }

    .left h1 {
        margin-bottom: 10px;
    }

    .right {
        width: 50%;
        padding: 40px;
        text-align: center;
    }

    .right h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #43e97b;
    }

    button {
        width: 95%;
        padding: 10px;
        background: #43e97b;
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #00c853;
    }

    a {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #43e97b;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
```

</head>

<body>

<div class="container">

```
<div class="left">
    <h1>Create Account</h1>
    <p>Join and track your stress levels easily</p>
</div>

<div class="right">
    <h2>Signup</h2>

    <form action="/register" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a href="/">Back to Login</a>
</div>
```

</div>

</body>
</html>
